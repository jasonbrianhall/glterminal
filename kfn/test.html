<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFN Parser Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f9f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e8edff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        input[type="file"] {
            display: none;
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .file-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }
        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .label {
            color: #667eea;
            font-weight: 600;
            min-width: 150px;
        }
        .value {
            color: #333;
            word-break: break-all;
        }
        .error {
            background: #ffe8e8;
            border-left: 4px solid #ff6b6b;
            color: #d32f2f;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .success {
            background: #e8ffe8;
            border-left: 4px solid #51cf66;
            color: #2f7f2f;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .loading {
            color: #667eea;
            font-style: italic;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        .files-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .file-item {
            background: #f9f9ff;
            border: 1px solid #e0e0ff;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            word-break: break-word;
        }
        .file-item.music { border-left: 3px solid #51cf66; }
        .file-item.lyrics { border-left: 3px solid #ffd43b; }
        .file-item.image { border-left: 3px solid #74c0fc; }
        .file-item.video { border-left: 3px solid #ff8c42; }
        .file-type {
            color: #667eea;
            font-weight: 600;
            font-size: 11px;
            margin-bottom: 3px;
        }
        audio, video {
            width: 100%;
            margin-top: 15px;
            border-radius: 6px;
        }
        canvas {
            width: 100%;
            max-height: 400px;
            border-radius: 6px;
            background: #000;
            margin-top: 15px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 KFN (Karafun) Parser Test</h1>
        <p class="subtitle">Upload a .kfn file to test AES-128 decryption and content extraction</p>

        <div class="section">
            <h2>📁 Upload KFN File</h2>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">Drag & drop KFN file here or click to browse</div>
                <div class="upload-hint">Supports .kfn files (Karafun format)</div>
                <input type="file" id="fileInput" accept=".kfn">
            </div>
        </div>

        <div id="status"></div>

        <div class="section" style="display: none;" id="debugSection">
            <h2>🔍 Debug Log</h2>
            <div id="debugLog" style="background: #1e1e1e; color: #0f0; font-family: 'Courier New', monospace; font-size: 12px; padding: 15px; border-radius: 6px; max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;"></div>
        </div>

        <div id="results" style="display: none;">
            <div class="section">
                <h2>✅ Parse Results</h2>
                <div id="parseInfo" class="file-info"></div>
            </div>

            <div class="section">
                <h2>📦 Extracted Files</h2>
                <div id="filesList" class="files-list"></div>
            </div>

            <div class="section">
                <h2>▶️ Media Players</h2>
                <div id="mediaPlayers"></div>
            </div>

            <div class="section">
                <h2>🎨 CD+G Visualization</h2>
                <canvas id="cdgCanvas" width="300" height="216" style="display: none;"></canvas>
                <div id="cdgInfo"></div>
            </div>
        </div>
    </div>

    <script src="kfnParser.js"></script>
    <script>
        const debugLog = document.getElementById('debugLog');
        const debugSection = document.getElementById('debugSection');
        let logLines = [];

        // Capture console output
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;

        console.log = function(...args) {
            originalLog.apply(console, args);
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            logLines.push(msg);
            debugLog.textContent = logLines.join('\n');
            debugLog.scrollTop = debugLog.scrollHeight;
            debugSection.style.display = 'block';
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            const msg = '⚠️ ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            logLines.push(msg);
            debugLog.textContent = logLines.join('\n');
            debugLog.scrollTop = debugLog.scrollHeight;
            debugSection.style.display = 'block';
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            const msg = '❌ ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            logLines.push(msg);
            debugLog.textContent = logLines.join('\n');
            debugLog.scrollTop = debugLog.scrollHeight;
            debugSection.style.display = 'block';
        };

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.kfn')) {
                showError('Please select a .kfn file');
                return;
            }

            showStatus(`<div class="loading">Reading file (${(file.size / 1024 / 1024).toFixed(2)} MB)...</div>`);

            try {
                const arrayBuffer = await file.arrayBuffer();
                const buffer = new Uint8Array(arrayBuffer);

                showStatus(`<div class="loading">Parsing KFN structure...</div>`);
                const kfnData = await parseKfn(buffer);

                showStatus(`<div class="loading">Extracting content...</div>`);
                const content = extractKfnContent(kfnData);

                displayResults(file, kfnData, content);
                showSuccess(`✅ Successfully parsed KFN file`);
            } catch (err) {
                showError(`❌ Error: ${err.message}`);
                console.error(err);
            }
        }

        function displayResults(file, kfnData, content) {
            // Parse info
            const parseInfo = document.getElementById('parseInfo');
            parseInfo.innerHTML = `
                <div class="info-row">
                    <span class="label">Filename:</span>
                    <span class="value">${file.name}</span>
                </div>
                <div class="info-row">
                    <span class="label">File Size:</span>
                    <span class="value">${(file.size / 1024 / 1024).toFixed(2)} MB</span>
                </div>
                <div class="info-row">
                    <span class="label">Total Files:</span>
                    <span class="value">${kfnData.entries.length}</span>
                </div>
                <div class="info-row">
                    <span class="label">Has Music:</span>
                    <span class="value">${content.music ? '✓ Yes' : '✗ No'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Has Lyrics:</span>
                    <span class="value">${content.lyrics ? `✓ Yes (${content.lyrics.ext.toUpperCase()})` : '✗ No'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Has Background:</span>
                    <span class="value">${content.background ? `✓ Yes (${content.backgroundType})` : '✗ No'}</span>
                </div>
            `;

            // Files list
            const filesList = document.getElementById('filesList');
            filesList.innerHTML = kfnData.entries.map(entry => {
                const typeNames = {
                    1: 'Lyrics',
                    2: 'Music',
                    3: 'Image',
                    4: 'Font',
                    5: 'Video'
                };
                const typeName = typeNames[entry.fileType] || 'Unknown';
                const typeClass = typeName.toLowerCase();
                return `
                    <div class="file-item ${typeClass}">
                        <div class="file-type">${typeName}</div>
                        <div>${entry.filename}</div>
                        <div style="color: #999; font-size: 11px;">
                            ${(entry.outputLength / 1024).toFixed(1)} KB
                        </div>
                    </div>
                `;
            }).join('');

            // Media players
            const mediaPlayers = document.getElementById('mediaPlayers');
            let html = '';

            if (content.music) {
                const audioBlob = new Blob([content.music.data], { 
                    type: getAudioMimeType(content.music.ext) 
                });
                const audioUrl = URL.createObjectURL(audioBlob);
                html += `
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px; color: #333;">🎵 Audio</h3>
                        <p style="color: #666; font-size: 13px; margin-bottom: 10px;">${content.music.filename}</p>
                        <audio controls></audio>
                    </div>
                `;
                setTimeout(() => {
                    mediaPlayers.querySelector('audio').src = audioUrl;
                }, 0);
            }

            if (content.background && content.backgroundType === 'video') {
                const videoBlob = new Blob([content.background], { type: 'video/mp4' });
                const videoUrl = URL.createObjectURL(videoBlob);
                html += `
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px; color: #333;">🎬 Background Video</h3>
                        <video controls></video>
                    </div>
                `;
                setTimeout(() => {
                    mediaPlayers.querySelector('video').src = videoUrl;
                }, 0);
            } else if (content.background && content.backgroundType === 'image') {
                const imageBlob = new Blob([content.background], { type: 'image/jpeg' });
                const imageUrl = URL.createObjectURL(imageBlob);
                html += `
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px; color: #333;">🖼️ Background Image</h3>
                        <img src="${imageUrl}" style="max-width: 100%; border-radius: 6px;">
                    </div>
                `;
            }

            // Show all extracted images
            kfnData.entries.forEach((entry, i) => {
                if (entry.fileType === 3) {  // TYPE_IMAGE
                    const key = entry.filename.toLowerCase();
                    if (kfnData.files[key]) {
                        const imageBlob = new Blob([kfnData.files[key].data], { type: 'image/jpeg' });
                        const imageUrl = URL.createObjectURL(imageBlob);
                        html += `
                            <div style="margin-bottom: 20px;">
                                <h3 style="margin-bottom: 10px; color: #333;">🖼️ ${entry.filename}</h3>
                                <img src="${imageUrl}" style="max-width: 100%; border-radius: 6px;">
                            </div>
                        `;
                    }
                }
            });

            mediaPlayers.innerHTML = html || '<p style="color: #999;">No audio/video files found</p>';

            // CD+G visualization
            const cdgInfo = document.getElementById('cdgInfo');
            if (content.lyrics && content.lyrics.ext === 'cdg') {
                const canvas = document.getElementById('cdgCanvas');
                canvas.style.display = 'block';
                const ctx = canvas.getContext('2d');
                
                try {
                    const cdgState = cdgCreateState(content.lyrics.data);
                    cdgUpdate(cdgState, 0);
                    
                    const imageData = ctx.createImageData(300, 216);
                    const px = imageData.data;
                    for (let i = 0; i < cdgState.screen.length; i++) {
                        const rgb = cdgState.palette[cdgState.screen[i]];
                        const o = i * 4;
                        px[o] = (rgb >> 16) & 0xFF;
                        px[o + 1] = (rgb >> 8) & 0xFF;
                        px[o + 2] = rgb & 0xFF;
                        px[o + 3] = 255;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    
                    cdgInfo.innerHTML = `
                        <p style="color: #667eea; margin-top: 10px;">
                            ✓ CD+G preview (frame 0 of ${cdgState.packetCount})
                        </p>
                    `;
                } catch (err) {
                    cdgInfo.innerHTML = `<p style="color: #d32f2f;">Failed to render CD+G: ${err.message}</p>`;
                }
            } else {
                document.getElementById('cdgCanvas').style.display = 'none';
            }

            resultsDiv.style.display = 'block';
        }

        function getAudioMimeType(ext) {
            const types = {
                mp3: 'audio/mpeg',
                wav: 'audio/wav',
                ogg: 'audio/ogg',
                m4a: 'audio/mp4',
                flac: 'audio/flac',
                aac: 'audio/aac',
                opus: 'audio/opus',
                webm: 'audio/webm'
            };
            return types[ext.toLowerCase()] || 'audio/mpeg';
        }

        function showStatus(html) {
            statusDiv.innerHTML = html;
            statusDiv.style.display = 'block';
        }

        function showError(message) {
            statusDiv.innerHTML = `<div class="error">${message}</div>`;
            statusDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
        }

        function showSuccess(message) {
            statusDiv.innerHTML = `<div class="success">${message}</div>`;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
