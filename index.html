<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix Stargate</title>
    <style>
        :root {
            --bg-start: #667eea;
            --bg-end: #764ba2;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #495057;
            --accent: #667eea;
            --accent-dark: #764ba2;
            --border-color: #e9ecef;
            --thead-bg: #f8f9fa;
            --parent-hover: #f0f4ff;
            --placeholder: #adb5bd;
        }

        html[data-theme="ocean"] {
            --bg-start: #2193b0; --bg-end: #6dd5ed; --accent: #2193b0; --accent-dark: #17607a;
            --card-bg: #ffffff; --text-main: #1c3a42; --text-secondary: #4a6b73;
            --border-color: #d9f0f5; --thead-bg: #eefbfd; --parent-hover: #e3f7fb; --placeholder: #9fc7cf;
        }
        html[data-theme="sunset"] {
            --bg-start: #ff7e5f; --bg-end: #feb47b; --accent: #ff7e5f; --accent-dark: #d9603f;
            --card-bg: #fffaf5; --text-main: #402a20; --text-secondary: #7a5445;
            --border-color: #ffe3d1; --thead-bg: #fff3ea; --parent-hover: #ffe9db; --placeholder: #d3ab97;
        }
        html[data-theme="forest"] {
            --bg-start: #11998e; --bg-end: #38ef7d; --accent: #11998e; --accent-dark: #0c6e66;
            --card-bg: #f6fdf9; --text-main: #12332c; --text-secondary: #3f6259;
            --border-color: #d7f2e6; --thead-bg: #ecfbf4; --parent-hover: #dff8ec; --placeholder: #9fc9b9;
        }
        html[data-theme="rose"] {
            --bg-start: #f857a6; --bg-end: #ff5858; --accent: #f857a6; --accent-dark: #c23d80;
            --card-bg: #fff7fa; --text-main: #3a1a28; --text-secondary: #7a4658;
            --border-color: #fbdce9; --thead-bg: #fef0f5; --parent-hover: #fde5ee; --placeholder: #dba7bb;
        }
        html[data-theme="autumn"] {
            --bg-start: #d38312; --bg-end: #a83279; --accent: #c06c00; --accent-dark: #a83279;
            --card-bg: #fffaf2; --text-main: #402c14; --text-secondary: #77583a;
            --border-color: #f3e0c2; --thead-bg: #fbf1de; --parent-hover: #f7e7cc; --placeholder: #cbab7c;
        }
        html[data-theme="mint"] {
            --bg-start: #43e97b; --bg-end: #38f9d7; --accent: #12b886; --accent-dark: #0a8f68;
            --card-bg: #f3fffb; --text-main: #10332a; --text-secondary: #3c6357;
            --border-color: #d3f6e9; --thead-bg: #e9fdf5; --parent-hover: #dcfaef; --placeholder: #9ad4bf;
        }
        html[data-theme="grape"] {
            --bg-start: #6a3093; --bg-end: #a044ff; --accent: #7d3fc0; --accent-dark: #5a2d8a;
            --card-bg: #faf7ff; --text-main: #2a1d3a; --text-secondary: #5c4a70;
            --border-color: #e6daf7; --thead-bg: #f4eefc; --parent-hover: #ede2fa; --placeholder: #b9a1d4;
        }
        html[data-theme="steel"] {
            --bg-start: #485563; --bg-end: #29323c; --accent: #5c7a99; --accent-dark: #3d5266;
            --card-bg: #f5f7f8; --text-main: #212a30; --text-secondary: #52626c;
            --border-color: #dde3e6; --thead-bg: #eef1f3; --parent-hover: #e3e9ec; --placeholder: #a6b3ba;
        }
        html[data-theme="coffee"] {
            --bg-start: #6f4e37; --bg-end: #c19a6b; --accent: #7c5230; --accent-dark: #563a20;
            --card-bg: #fdf8f2; --text-main: #34241a; --text-secondary: #6e5641;
            --border-color: #ecdcc7; --thead-bg: #f8f0e5; --parent-hover: #f1e5d3; --placeholder: #c7ac8d;
        }
        html[data-theme="candy"] {
            --bg-start: #ff9a9e; --bg-end: #fecfef; --accent: #e8598f; --accent-dark: #b83d6d;
            --card-bg: #fffafc; --text-main: #3e1f2c; --text-secondary: #7a4d5d;
            --border-color: #fbdfe9; --thead-bg: #fdeef4; --parent-hover: #fce3ed; --placeholder: #d9a9bb;
        }
        html[data-theme="sky"] {
            --bg-start: #56ccf2; --bg-end: #2f80ed; --accent: #2f80ed; --accent-dark: #1c5cb3;
            --card-bg: #f6fbff; --text-main: #172a3a; --text-secondary: #4c6579;
            --border-color: #d6eaf9; --thead-bg: #ebf6fd; --parent-hover: #ddeffb; --placeholder: #9dc2da;
        }
        html[data-theme="lime"] {
            --bg-start: #a8e063; --bg-end: #56ab2f; --accent: #56ab2f; --accent-dark: #3d7a20;
            --card-bg: #f8fdf2; --text-main: #26331a; --text-secondary: #55663e;
            --border-color: #e2f2cf; --thead-bg: #f2fae5; --parent-hover: #e9f6d7; --placeholder: #b6cf94;
        }
        html[data-theme="graphite"] {
            --bg-start: #232526; --bg-end: #414345; --accent: #6b6f73; --accent-dark: #4a4d50;
            --card-bg: #ffffff; --text-main: #222222; --text-secondary: #565656;
            --border-color: #e2e2e2; --thead-bg: #f2f2f2; --parent-hover: #e9e9e9; --placeholder: #a8a8a8;
        }
        html[data-theme="midnight"] {
            --bg-start: #0f2027; --bg-end: #203a43; --accent: #4fc3dc; --accent-dark: #2a95ac;
            --card-bg: #16232b; --text-main: #dbeef2; --text-secondary: #93b3bc;
            --border-color: #223942; --thead-bg: #1c2e37; --parent-hover: #223a44; --placeholder: #567179;
        }
        html[data-theme="dracula"] {
            --bg-start: #282a36; --bg-end: #44475a; --accent: #bd93f9; --accent-dark: #8e6fce;
            --card-bg: #21222c; --text-main: #f8f8f2; --text-secondary: #b6b8c4;
            --border-color: #3a3c4e; --thead-bg: #2b2d3a; --parent-hover: #343650; --placeholder: #6272a4;
        }
        html[data-theme="nord"] {
            --bg-start: #2e3440; --bg-end: #4c566a; --accent: #88c0d0; --accent-dark: #5e9fb0;
            --card-bg: #3b4252; --text-main: #eceff4; --text-secondary: #b8c2d6;
            --border-color: #4c566a; --thead-bg: #434c5e; --parent-hover: #4c566a; --placeholder: #7b88a1;
        }
        html[data-theme="monokai"] {
            --bg-start: #272822; --bg-end: #3e3d32; --accent: #a6e22e; --accent-dark: #79a825;
            --card-bg: #2d2e27; --text-main: #f8f8f2; --text-secondary: #c2c3ba;
            --border-color: #48493f; --thead-bg: #34352c; --parent-hover: #3d3e33; --placeholder: #75766c;
        }
        html[data-theme="cyberpunk"] {
            --bg-start: #0d0221; --bg-end: #260750; --accent: #ff2a6d; --accent-dark: #05d9e8;
            --card-bg: #150636; --text-main: #f4f0ff; --text-secondary: #b19cd9;
            --border-color: #3a1a63; --thead-bg: #1d0b46; --parent-hover: #2a1258; --placeholder: #6a4b96;
        }
        html[data-theme="highcontrast"] {
            --bg-start: #000000; --bg-end: #1a1a1a; --accent: #ffff00; --accent-dark: #cccc00;
            --card-bg: #000000; --text-main: #ffffff; --text-secondary: #dddddd;
            --border-color: #444444; --thead-bg: #111111; --parent-hover: #222222; --placeholder: #999999;
        }
        
        html[data-theme="highcontrast"] .slideshow-btn,
        html[data-theme="highcontrast"] .music-ctrl-btn,
        html[data-theme="highcontrast"] .video-nav-btn,
        html[data-theme="highcontrast"] .viz-mode-btn,
        html[data-theme="highcontrast"] button {
            background: #000000 !important;
            color: #ff0000 !important;
            border: 3px solid #ffffff !important;
        }
        
        html[data-theme="highcontrast"] .slideshow-btn:hover,
        html[data-theme="highcontrast"] .music-ctrl-btn:hover,
        html[data-theme="highcontrast"] .video-nav-btn:hover,
        html[data-theme="highcontrast"] .viz-mode-btn:hover,
        html[data-theme="highcontrast"] button:hover {
            background: #1a1a1a !important;
            color: #ff6666 !important;
        }
        
        html[data-theme="highcontrast"] td {
            color: #ffffff !important;
        }
        
        html[data-theme="highcontrast"] .type-directory,
        html[data-theme="highcontrast"] .type-link {
            color: #ff0000 !important;
        }
        
        html[data-theme="highcontrast"] a {
            color: #ffffff !important;
        }
        
        html[data-theme="highcontrast"] a:hover {
            color: #ff0000 !important;
        }
        html[data-theme="slate-blue"] {
            --bg-start: #1e3c72; --bg-end: #2a5298; --accent: #4a7fd6; --accent-dark: #345c9e;
            --card-bg: #101c30; --text-main: #e4ecfa; --text-secondary: #9db2d4;
            --border-color: #24365a; --thead-bg: #18294a; --parent-hover: #1f3457; --placeholder: #5b729c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        #consoleBtn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            transition: background 0.2s;
        }

        #consoleBtn:hover {
            background: var(--accent-dark);
        }

        .console-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .console-modal.active {
            display: flex;
        }

        .console-container {
            background: var(--card-bg);
            color: var(--accent);
            font-family: 'Courier New', monospace;
            width: 100%;
            height: 100%;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            box-shadow: none;
        }

        .console-header {
            background: var(--thead-bg);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
        }

        .console-header h3 {
            margin: 0;
            font-size: 14px;
            color: var(--accent);
        }

        .console-close {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
        }

        .console-output {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-size: 13px;
            line-height: 1.4;
            background: var(--card-bg);
            color: var(--text-main);
        }

        .console-input-line {
            display: flex;
            padding: 5px 15px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
        }

        .console-prompt {
            color: var(--accent);
            margin-right: 5px;
            flex-shrink: 0;
        }

        .console-input-line input {
            background: var(--card-bg);
            color: var(--accent);
            border: none;
            outline: none;
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .console-output-line {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-main);
        }

        .console-output-line.command {
            color: var(--accent);
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 3000;
            overflow: auto;
        }

        .preview-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-container {
            background: var(--card-bg);
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .preview-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
            flex: 1;
        }

        .preview-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 16px;
        }

        .preview-close:hover {
            color: var(--text-main);
        }

        .preview-content {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100%;
            margin: 0 auto;
            display: block;
        }

        .preview-code {
            background: var(--thead-bg);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-main);
        }

        .preview-code-line {
            display: flex;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .preview-code-line-num {
            display: inline-block;
            width: 40px;
            text-align: right;
            margin-right: 16px;
            color: var(--placeholder);
            user-select: none;
            flex-shrink: 0;
        }

        .preview-code-line-content {
            flex: 1;
        }

        .syntax-keyword { color: #d73a49; }
        .syntax-string { color: #24a138; }
        .syntax-number { color: #005cc5; }
        .syntax-comment { color: #6a737d; font-style: italic; }
        .syntax-function { color: #6f42c1; }

        html[data-theme="dracula"] .syntax-keyword { color: #ff79c6; }
        html[data-theme="dracula"] .syntax-string { color: #f1fa8c; }
        html[data-theme="dracula"] .syntax-number { color: #bd93f9; }
        html[data-theme="dracula"] .syntax-comment { color: #6272a4; }
        html[data-theme="dracula"] .syntax-function { color: #50fa7b; }

        html[data-theme="nord"] .syntax-keyword { color: #bf616a; }
        html[data-theme="nord"] .syntax-string { color: #a3be8c; }
        html[data-theme="nord"] .syntax-number { color: #b48ead; }
        html[data-theme="nord"] .syntax-comment { color: #616e88; }
        html[data-theme="nord"] .syntax-function { color: #88c0d0; }

        .preview-text {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-main);
            max-height: 600px;
            overflow-y: auto;
        }

        .preview-truncated {
            color: var(--placeholder);
            font-style: italic;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .preview-size-warning {
            background: #fff3cd;
            color: #856404;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        html[data-theme="dracula"] .preview-size-warning {
            background: #44475a;
            color: #f8f8f2;
        }

        .header {
            background: var(--card-bg);
            border-radius: 12px 12px 0 0;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-bottom: 3px solid var(--accent);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text-main);
            font-weight: 600;
            margin-bottom: 5px;
            flex: 1 1 280px;
            min-width: 220px;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .header .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            flex: 1 1 100%;
            order: 3;
        }

        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .breadcrumb a:hover {
            background-color: var(--parent-hover);
            text-decoration: underline;
        }

        .breadcrumb span {
            color: var(--text-secondary);
        }

        .new-window-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .new-window-toggle input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        table {
            width: 100%;
            background: var(--card-bg);
            border-collapse: collapse;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        thead {
            background: var(--thead-bg);
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 96px;
            z-index: 10;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th:hover {
            background: var(--border-color);
        }

        th.sort-asc::after {
            content: " ▲";
            color: var(--accent);
        }

        th.sort-desc::after {
            content: " ▼";
            color: var(--accent);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-main);
        }

        tr:hover {
            background: var(--thead-bg);
        }

        tr.parent-dir:hover {
            background: var(--parent-hover);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--accent-dark);
            text-decoration: underline;
        }

        tr.parent-dir a {
            color: var(--accent-dark);
            font-weight: 600;
        }

        .type-directory {
            color: var(--accent-dark);
            font-weight: 500;
        }

        .type-link {
            color: #e67e22;
            font-weight: 500;
        }

        .size-placeholder {
            color: var(--placeholder);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .table-wrapper {
            background: var(--card-bg);
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        tbody tr:last-child td:first-child {
            border-radius: 0 0 0 12px;
        }

        tbody tr:last-child td:last-child {
            border-radius: 0 0 12px 0;
        }

        .slideshow-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s;
        }

        .slideshow-btn:hover {
            background: var(--accent-dark);
        }

        a.slideshow-btn {
            display: inline-block;
            text-decoration: none;
        }

        .theme-select {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 9px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .file-filter {
            flex: 0 1 240px;
            padding: 9px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-main);
            background: var(--card-bg);
        }

        .file-filter:focus {
            outline: none;
            border-color: var(--accent);
        }

        .slideshow-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .slideshow-overlay.active {
            display: flex;
        }

        .slideshow-overlay img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transform-origin: center center;
            cursor: zoom-in;
            transition: transform 0.05s ease-out;
        }

        .slideshow-overlay img.zoomed {
            cursor: grab;
        }

        .slideshow-overlay img.panning {
            cursor: grabbing;
            transition: none;
        }

        .slideshow-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 32px;
            cursor: pointer;

        }

        .viz-wrap {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .viz-canvas {
            width: 100%;
            aspect-ratio: 480 / 270;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);

            cursor: pointer;
        }

        .viz-canvas:fullscreen {

        .viz-mode-btn {

        .kfn-track-controls {

            gap: 8px;
            margin-top: 4px;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .kfn-track-controls.controls-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .kfn-track-controls .viz-mode-btn.muted {
            background: rgba(220, 50, 50, 0.55);
            border-color: rgba(255, 120, 120, 0.6);
            color: white;
        }

        .cdg-export-wrap {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .cdg-btn-row {
            display: flex;
            gap: 8px;

        .music-title {
            font-size: 16px;

        .music-progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .music-time {
            font-size: 12px;
            color: #ccc;
            width: 36px;
            flex-shrink: 0;
        }

        .music-seek {
            flex: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .music-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .music-ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;

            height: 44px;
            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .music-ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .music-ctrl-btn.active {
            background: var(--accent);
        }

        .music-play-btn {
            width: 54px;
            height: 54px;

        }

        .music-play-btn:hover {
            background: #7c8ff0;
        }

        .music-search {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);

            color: #000;
            margin-top: 8px;
        }

        .music-search::placeholder {
            color: #555;
        }

        .music-search:focus {
            outline: none;
            border-color: var(--accent);
            background: #ffffff;
        }

        .music-table-scroll {
            width: 100%;
            max-height: 30vh;
            overflow-y: auto;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .music-table {
            width: 100%;
            border-collapse: collapse;
        }

        .music-table thead {
            position: sticky;
            top: 0;

        }

        .music-table th {
            padding: 10px 14px;

            white-space: nowrap;
        }

        .music-table th:hover {

        .music-table th.sort-asc::after {

        }

        }

        .music-cdg-cell {

        }

<body>
    <div class="container">
        <div class="header">
            <h1 id="title">Felix Stargate</h1>
            <div class="breadcrumb"></div>
            <input type="text" id="fileFilter" class="file-filter" placeholder="Filter files...">
            <div style="display: flex; align-items: center; gap: 20px; flex-shrink: 0;">
                <a id="homeBtn" class="slideshow-btn" style="display: none; cursor: pointer;">🏠 Home</a>
                <button id="consoleBtn" style="background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-left: 10px;">🛸 Warpdrive</button>
                <button id="slideshowBtn" class="slideshow-btn" style="display: none;">▶ Slideshow</button>
                <button id="musicBtn" class="slideshow-btn" style="display: none;">♪ Play Music</button>
                <button id="videoBtn" class="slideshow-btn" style="display: none;">▶ Play Video</button>
                <button id="downloadBtn" class="slideshow-btn" style="display: none; background: #28a745;" title="Download selected files">⬇ Download</button>
                <button id="selectAllBtn" class="slideshow-btn" style="display: none; background: #6c757d;" title="Select/Deselect all">☑ Select All</button>
                <label class="new-window-toggle">
                    <input type="checkbox" id="showHiddenToggle">
                    Show hidden
                </label>
                <label class="new-window-toggle">
                    <input type="checkbox" id="newWindowToggle">
                    Open in new window
                </label>
                <select id="themeSelect" class="theme-select"></select>
            </div>
        </div>
        <div class="table-wrapper">
            <table id="fileTable">
                <thead>
                    <tr>
                        <th style="width: 5%; text-align: center;"><input type="checkbox" id="selectAllCheckbox" style="cursor: pointer;"></th>
                        <th data-col="name" style="width: 40%;">Name</th>
                        <th data-col="type" style="width: 15%;">Type</th>
                        <th data-col="size" style="width: 15%;">Size</th>
                        <th data-col="modified" style="width: 25%;">Modified</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="slideshow-overlay" id="slideshowOverlay">
        <button class="slideshow-close" id="slideshowClose">&times;</button>
        <button class="slideshow-autoplay" id="slideshowAutoplay" title="Auto-advance">&#9658;</button>
        <button class="slideshow-nav slideshow-prev" id="slideshowPrev">&#10094;</button>
        <img id="slideshowImg" src="" alt="">
        <button class="slideshow-nav slideshow-next" id="slideshowNext">&#10095;</button>
        <div class="slideshow-caption" id="slideshowCaption"></div>
    </div>

    <div class="music-overlay" id="musicOverlay">
        <button class="slideshow-close" id="musicClose">&times;</button>
        <div class="video-nav-stack">
            <button class="video-nav-btn" id="musicUpBtn" title="Previous song">&#9650;</button>
            <button class="video-nav-btn" id="musicDownBtn" title="Next song">&#9660;</button>
        </div>
        <div class="music-player">
            <div class="music-art" id="musicArt">&#9835;</div>
            <canvas class="cdg-canvas" id="cdgCanvas" width="300" height="216" style="display: none;"></canvas>
            <div class="kfn-lyrics-wrap" id="kfnLyricsWrap" style="display: none;">
                <div class="kfn-viz-bg" id="kfnVizBg"></div>
                <div class="kfn-lyrics-current" id="kfnLyricsCurrent"></div>
                <div class="kfn-lyrics-next" id="kfnLyricsNext"></div>
                <div class="kfn-track-controls" id="kfnTrackControls">
                    <button id="kfnMuteVocalBtn" class="viz-mode-btn" title="Mute vocal track">&#127908; Vocal</button>
                    <button id="kfnMuteBackingBtn" class="viz-mode-btn" title="Mute backing track">&#127925; Backing</button>
                </div>
            </div>
            <div class="viz-wrap" id="vizWrap" style="display: none;">
                <canvas class="viz-canvas" id="vizCanvas" width="480" height="270"></canvas>
                <div class="viz-btn-row">
                    <button id="vizExportBtn" class="viz-mode-btn">&#11015; Export</button>
                    <button id="vizModeBtn" class="viz-mode-btn"></button>
                </div>
            </div>
            <div class="cdg-export-wrap" id="cdgExportWrap" style="display: none;">
                <div class="cdg-btn-row">
                    <button id="cdgExportBtn" class="viz-mode-btn">&#11015; Export</button>
                </div>
            </div>
            <div class="music-title" id="musicTitle"></div>
            <div class="music-progress-row">
                <span class="music-time" id="musicTimeCurrent">0:00</span>
                <input type="range" id="musicSeek" class="music-seek" min="0" max="100" value="0">
                <span class="music-time" id="musicTimeDuration">0:00</span>
            </div>
            <div class="music-controls">
                <button id="musicShuffle" class="music-ctrl-btn" title="Shuffle">&#128256;</button>
                <button id="musicPrev" class="music-ctrl-btn" title="Previous">&#9198;</button>
                <button id="musicPlayPause" class="music-ctrl-btn music-play-btn" title="Play/Pause">&#9658;</button>
                <button id="musicNext" class="music-ctrl-btn" title="Next">&#9197;</button>
                <button id="musicRepeat" class="music-ctrl-btn" title="Repeat">&#128257;</button>
            </div>
            <input type="text" id="musicSearch" class="music-search" placeholder="Search files...">
            <div class="music-table-scroll">
                <table class="music-table" id="musicTable">
                    <thead>
                        <tr>
                            <th data-col="name">Name</th>
                            <th data-col="type" style="width: 70px;">Type</th>
                            <th data-col="cdg" style="width: 60px;">CD+G</th>
                        </tr>
                    </thead>
                    <tbody id="musicTableBody"></tbody>
                </table>
            </div>
        </div>
        <audio id="musicAudio"></audio>
        <audio id="musicBackingAudio"></audio>
    </div>

    <div class="video-overlay" id="videoOverlay">
        <button class="slideshow-close" id="videoClose">&times;</button>
        <div class="video-nav-stack">
            <button class="video-nav-btn" id="videoUpBtn" title="Previous video">&#9650;</button>
            <button class="video-nav-btn" id="videoDownBtn" title="Next video">&#9660;</button>
        </div>
        <div class="video-player">
            <video id="videoElement" controls></video>
            <div class="music-title" id="videoTitle"></div>
            <input type="text" id="videoSearch" class="music-search" placeholder="Search files...">
            <div class="music-table-scroll">
                <table class="music-table" id="videoTable">
                    <thead>
                        <tr>
                            <th data-col="name">Name</th>
                            <th data-col="type" style="width: 70px;">Type</th>
                            <th data-col="subs" style="width: 90px;">Subtitles</th>
                        </tr>
                    </thead>
                    <tbody id="videoTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="previewModal" class="preview-modal">
        <div class="preview-container">
            <div class="preview-header">
                <div class="preview-title" id="previewTitle"></div>
                <button class="preview-close" onclick="closePreview()">&times;</button>
            </div>
            <div class="preview-content" id="previewContent"></div>
        </div>
    </div>
