<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px 12px 0 0;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-bottom: 3px solid #667eea;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header .breadcrumb {
            display: none;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th:hover {
            background: #e9ecef;
        }

        th.sort-asc::after {
            content: " ▲";
            color: #667eea;
        }

        th.sort-desc::after {
            content: " ▼";
            color: #667eea;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #e9ecef;
            font-size: 14px;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        tr.parent-dir:hover {
            background: #f0f4ff;
        }

        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        tr.parent-dir a {
            color: #764ba2;
            font-weight: 600;
        }

        .type-directory {
            color: #764ba2;
            font-weight: 500;
        }

        .type-link {
            color: #e67e22;
            font-weight: 500;
        }

        .size-placeholder {
            color: #adb5bd;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .table-wrapper {
            background: white;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="title">File Browser</h1>
        </div>
        <div class="table-wrapper">
            <table id="fileTable">
                <thead>
                    <tr>
                        <th data-col="name" style="width: 45%;">Name</th>
                        <th data-col="type" style="width: 15%;">Type</th>
                        <th data-col="size" style="width: 15%;">Size</th>
                        <th data-col="modified" style="width: 25%;">Modified</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let fileData = [];
        let sortState = { col: null, dir: 1 };

        // Encode parentheses and square brackets in paths: ( -> %28, ) -> %29, [ -> %5B, ] -> %5D
        function encodeParens(path) {
            return path.replace(/\(/g, '%28').replace(/\)/g, '%29').replace(/\[/g, '%5B').replace(/\]/g, '%5D');
        }

        async function loadFiles() {
            const dir = window.location.pathname;
            const encodedDir = encodeParens(dir);
            
            // Decode the path for display
            const displayDir = decodeURIComponent(dir) || '/';
            document.title = `File Browser - ${displayDir}`;
            document.getElementById('title').textContent = displayDir;

            const response = await fetch('/api/listfiles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dir: encodedDir })
            });

            const data = await response.json();
            fileData = data.entries;
            
            // Sort by name by default
            sortState.col = 'name';
            sortState.dir = 1;
            const sorted = [...fileData].sort((a, b) => a.name.localeCompare(b.name));
            
            updateSortIndicators('name');
            renderTable(sorted);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Determine if file should open in browser or download
        function getFileTarget(filename) {
            const viewableExtensions = [
                '.txt', '.md', '.html', '.htm', '.xml', '.json', '.csv', '.log',
                '.jpg', '.jpeg', '.png', '.gif', '.svg', '.webp', '.bmp', '.ico',
                '.pdf', '.mp4', '.webm', '.ogg', '.mp3', '.wav', '.m4a',
                '.js', '.css', '.py', '.cpp', '.c', '.h', '.java', '.rb', '.go', '.rs'
            ];
            
            const ext = filename.substring(filename.lastIndexOf('.')).toLowerCase();
            return viewableExtensions.includes(ext) ? '_blank' : null;
        }

        function renderTable(entries) {
            const tbody = document.querySelector('#fileTable tbody');
            tbody.innerHTML = '';

            // Add parent directory link if not root
            const currentPath = window.location.pathname;
            const hasParentDir = currentPath !== '/' && currentPath !== '';
            
            if (hasParentDir) {
                const row = document.createElement('tr');
                row.classList.add('parent-dir');
                const parentPath = currentPath.substring(0, currentPath.lastIndexOf('/')) || '/';
                row.innerHTML = `
                    <td><a href="${parentPath}">..</a></td>
                    <td class="type-directory">directory</td>
                    <td class="size-placeholder">-</td>
                    <td class="size-placeholder">-</td>
                `;
                tbody.appendChild(row);
            }

            entries.forEach((entry) => {
                const row = document.createElement('tr');
                const entryPath = currentPath.endsWith('/') 
                    ? `${currentPath}${entry.name}`
                    : `${currentPath}/${entry.name}`;
                const encodedEntryPath = encodeParens(entryPath);

                let nameCell;
                if (entry.type === 'directory') {
                    nameCell = `<a href="${encodedEntryPath}">${entry.name}</a>`;
                } else if (entry.type === 'link') {
                    nameCell = `<a href="${encodedEntryPath}" target="${getFileTarget(entry.name) || '_self'}">${entry.name}</a>`;
                } else {
                    const target = getFileTarget(entry.name);
                    nameCell = `<a href="${encodedEntryPath}" target="${target || '_self'}">${entry.name}</a>`;
                }

                const typeClass = entry.type === 'directory' ? 'type-directory' : 
                                 entry.type === 'link' ? 'type-link' : '';
                const sizeDisplay = entry.type === 'file' ? formatFileSize(entry.size) : '-';
                const sizeClass = entry.type === 'file' ? '' : 'size-placeholder';

                row.innerHTML = `
                    <td>${nameCell}</td>
                    <td class="${typeClass}">${entry.type}</td>
                    <td class="${sizeClass}">${sizeDisplay}</td>
                    <td class="size-placeholder">${new Date(entry.modified * 1000).toLocaleString()}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function sortByColumn(col) {
            if (sortState.col === col) {
                sortState.dir *= -1;
            } else {
                sortState.col = col;
                sortState.dir = 1;
            }

            const sorted = [...fileData].sort((a, b) => {
                let x = a[col];
                let y = b[col];

                if (col === 'size' || col === 'modified') {
                    return (x - y) * sortState.dir;
                }

                return x.localeCompare(y) * sortState.dir;
            });

            updateSortIndicators(col);
            renderTable(sorted);
        }

        function updateSortIndicators(col) {
            document.querySelectorAll('th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.dataset.col === col) {
                    th.classList.add(sortState.dir === 1 ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        document.querySelectorAll('th[data-col]').forEach(th => {
            th.addEventListener('click', () => sortByColumn(th.dataset.col));
        });

        loadFiles();
    </script>
</body>
</html>
